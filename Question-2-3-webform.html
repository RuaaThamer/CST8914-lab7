<!doctype html>
<html lang="en">
  <head>
    <title>
      Form validation with messages on top: Code example - Accessibility
      Developer Guide example
    </title>
    <meta charset="utf-8" />
    <style>
      .control,
      fieldset {
        margin: 6px 0;
      }

      label {
        display: inline-block;
        width: 120px;
        vertical-align: top;
      }

      input + label {
        width: auto;
      }

      .error,
      .required {
        color: red;
      }

      fieldset ul {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <h1>Feedback form</h1>
    <form>
      <div class="control">
        <label for="name">Full name <span class="required">*</span></label
        ><input id="name" name="name" type="text" />
      </div>
      <div class="control">
        <label for="biography">Biography</label
        ><textarea id="biography" name="biography" type="text"></textarea>
        <span>Include examples on your skills in JavaScript.</span>
      </div>

      <fieldset>
        <!--added fieldset-->
        <legend>Gender</legend>
        <div class="control">
          <input id="gender_male" name="gender" type="radio" value="male" />
          <label for="gender_male">Male</label>
        </div>
        <div class="control">
          <input id="gender_female" name="gender" type="radio" value="female" />
          <label for="gender_female">Female</label>
        </div>
        <!--add label for female-->
      </fieldset>

      <div class="control">
        <input
          id="accept_agbs"
          name="accept_agbs"
          type="checkbox"
          value="1"
        /><label for="accept_agbs">I accept the terms and conditions</label>
      </div>
      <div class="control">
        <input name="validate" type="hidden" value="1" /><input
          type="submit"
          value="Register"
        />
      </div>
    </form>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"
      integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
      crossorigin="anonymous"
    ></script>
    <script>
      "use strict";

      (function () {
        var validateInput;

        $.urlParam = function (name) {
          var results;
          results = new RegExp("[?&]" + name + "=([^&#]*)").exec(
            window.location.href,
          );

          if (results === null) {
            return null;
          } else {
            return decodeURI(results[1]) || null;
          }
        };

        validateInput = function validateInput(input, message) {
          var $elementToDescribe,
            $error,
            $errorContainer,
            $fieldset,
            $input,
            $referencedElement,
            value;
          $input = $('[name="' + input + '"]');
          //Added || value === "" to catch empty submissions
          if ((value = $.urlParam(input)) === null || value === "") {
            if ($("fieldset.errors").length === 0) {
              $("form").prepend(
                //updated with role and tabindex
                '<fieldset class="errors" role="alert" tabindex="-1"><legend>Errors</legend><ul></ul></fieldset>',
              );
            }

            $referencedElement = null;
            $elementToDescribe = null;
            $errorContainer = $("fieldset.errors ul");

            if ($input.is(":radio")) {
              $fieldset = $input.closest("fieldset");
              $elementToDescribe = $fieldset;
              $referencedElement = $input.filter(":first");
            } else {
              $elementToDescribe = $input;
              $referencedElement = $input;
            }
            //  fixed added href="#" so it's a keyboard-accessible link ;)
            $error = $(
              '<a href="#' +
                input +
                '" id="' +
                input +
                '_description">' +
                message +
                "</a>",
            );
            $error.click(function (e) {
              // Preventing default link behavior because we are manually managing focus below
              e.preventDefault();
              // This moves the focus to the actual input field when the link is clicked
              $referencedElement.focus();
            });

            $elementToDescribe.attr("aria-describedby", input + "_description");
            $errorContainer.append("<li>").find("li:last").append($error);
            return false; // CHANGE: Return false so we know there is an error
          } else {
            if ($input.is(":checkbox")) {
              $input.attr("checked", true);
            }

            if ($input.is(":radio")) {
              return $input
                .filter('[value="' + value + '"]')
                .attr("checked", true);
            } else {
              return $input.val(value);
            }
          }
        };

        $(document).ready(function () {
          if ($.urlParam("validate")) {
            // CHANGE: Store the result (true/false) of each validation
            var v1 = validateInput("name", "Please enter your name!");
            var v2 = validateInput(
              "biography",
              "Please tell us something about your history!",
            );
            var v3 = validateInput("gender", "Please tell us your gender!");
            var v4 = validateInput(
              "accept_agbs",
              "You must accept our terms and conditions!",
            );

            // CHANGE: Check if ALL fields returned true
            if (v1 && v2 && v3 && v4) {
              return alert("All inputs are valid.");
            } else {
              // CHANGE: Focus management - move focus to the errors area
              // This ensures screen reader users hear the errors immediately
              $(".errors").focus();
            }
          }
        });
      }).call(void 0);
    </script>
  </body>
</html>
